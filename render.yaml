services:
  - type: web
    name: nba-driver
    runtime: python
    rootDir: backend
    buildCommand: |
      pip install -r requirements.txt &&
      cd ../frontend && npm install && npm run build
    startCommand: uvicorn api.main:app --host 0.0.0.0 --port $PORT
    disk:
      name: nba-data
      mountPath: /data
      sizeGB: 1
    envVars:
      - key: NBA_DB_PATH
        value: /data/nba.db
      - key: MODELS_DIR
        value: /data/models
